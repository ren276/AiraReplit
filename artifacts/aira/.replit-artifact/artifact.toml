kind = "mobile"
previewPath = "/"
title = "AIRA Health Analytics"
version = "1.0.0"
id = "artifacts/aira"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22078

[services.development]
run = "pnpm --filter @workspace/aira run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aira", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aira", "run", "serve" ]

[services.env]
PORT = "22078"
BASE_PATH = "/"
